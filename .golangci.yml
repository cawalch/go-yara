# golangci-lint configuration for go-yara
# Modern Go 1.25+ best practices - focus on code quality, performance, and security

version: "2"

run:
  go: "1.25"
  timeout: 5m
  modules-download-mode: readonly

output:
  formats:
    text:
      path: stdout
      colors: true
      print-issued-lines: true
      print-linter-name: true

linters:
  enable:
    # Core Go linters (essential for code quality)
    - govet
    - ineffassign
    - unused

    # Essential code quality (non-nitpick)
    - misspell
    - unconvert

  disable:
    # Disable the noisy linters
    - errcheck
    - staticcheck
    - gosec

    # Disable complexity and nitpick linters for now
    - gocyclo
    - cyclop
    - gocognit
    - funlen
    - dupl
    - gocritic
    - revive
    - unparam
    - wastedassign
    - perfsprint
    - makezero
    - intrange
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - contextcheck
    - errorlint
    - wrapcheck
    - errname
    - copyloopvar
    - gochecksumtype
    - usestdlibvars
    - modernize
    - mirror
    - maintidx
    - iface
    - nakedret
    - nestif
    - rowserrcheck
    - sqlclosecheck
    - importas
    - gomoddirectives
    - godoclint
    - thelper
    - tparallel
    - testifylint
    - tagalign
    - exhaustive
    - forbidigo
    - godot
    - godox
    - mnd
    - gomodguard
    - ireturn
    - nlreturn
    - varnamelen
    - testpackage
    - paralleltest
    - nosprintfhostport
    - nolintlint
    - goprintffuncname
    - goconst
    - prealloc
    - bodyclose
    - whitespace

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  # Show all issues, not just new ones
  new: false

severity:
  default: error
