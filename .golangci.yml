# golangci-lint configuration for go-yara
# Modern Go 1.25+ best practices - focus on code quality, performance, and security
# Removes nitpick rules, emphasizes bug detection and anti-pattern prevention

version: "2"

run:
  go: "1.25"
  timeout: 5m
  modules-download-mode: readonly
  skip-dirs:
    - internal/profiling
    - internal/comparison
    - vendor
  skip-files:
    - ".*\\.pb\\.go$"
    - ".*_generated\\.go$"

output:
  formats:
    text:
      path: stdout
      colors: true
      print-issued-lines: true
      print-linter-name: true

linters:
  settings:
    # Cyclomatic complexity - reasonable limits for complex algorithms
    cyclop:
      max-complexity: 15
      package-average: 7.0

    # Function length - more flexible for complex logic
    funlen:
      lines: 100
      statements: 50
      ignore-comments: true

    # Cognitive complexity - allow for complex algorithms
    gocognit:
      min-complexity: 15

    # Code duplication - higher threshold for performance-critical code
    dupl:
      threshold: 150

    # Enhanced error handling for Go 1.25+
    errcheck:
      check-type-assertions: true
      check-blank: true
      disable-default-exclusions: false
      exclude-functions:
        - (*os.File).Close
        - (*strings.Builder).WriteString
        - (*strings.Builder).WriteByte
        - (*bytes.Buffer).WriteString
        - (net/http.Client).Do

    # Modern unused code detection
    unused:
      field-writes-are-uses: false
      post-statements-are-reads: false
      parameters-are-used: true
      local-variables-are-used: true

    # Enhanced govet with all checks for Go 1.25+
    govet:
      enable-all: true
      disable:
        - fieldalignment # Will handle separately for performance-critical paths
      settings:
        shadow:
          strict: true

    # Modern revive configuration - focus on important rules
    revive:
      rules:
        - name: exported
          severity: error
        - name: unreachable-code
          severity: error
        - name: unused-parameter
          severity: warning
        - name: receiver-naming
          severity: warning
        - name: time-naming
          severity: warning
        - name: error-return
          severity: warning
        - name: error-strings
          severity: warning
        - name: error-naming
          severity: warning
        - name: if-return
          severity: warning
        - name: increment-decrement
          severity: warning
        - name: var-declaration
          severity: warning
        - name: range
          severity: warning
        - name: get-return
          severity: warning
        - name: var-naming
          severity: warning
        - name: argument-limit
          severity: warning
          arguments: [3]
        - name: context-as-argument
          severity: warning
        - name: context-keys-type
          severity: warning
        - name: indent-error-flow
          severity: warning
        - name: errorf
          severity: warning

    # Enhanced security for modern threats
    gosec:
      severity: medium
      confidence: medium
      excludes:
        - G104 # Errors handled separately with errcheck
        - G115 # Integer conversions handled explicitly
        - G204 # Input validation handled separately
        - G304 # File path validation handled separately
        - G107 # URL handling in parser is controlled
        - G307 # Defers in performance-critical code are acceptable

    # Modern test configuration
    testpackage:
      skip-regexp: "(export|internal)_test\\.go"

    # Reasonable line length for modern displays
    lll:
      line-length: 130
      tab-width: 4

    # Performance-focused linters
    prealloc:
      simple: true
      range-loops: true
      for-loops: true

    # Modern gocritic settings
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - dupImport # https://github.com/go-critic/go-critic/issues/845
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - wrapperFunc

  enable:
    # Core Go linters (essential for code quality)
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Modern code quality linters
    - gocyclo
    - cyclop
    - gocognit
    - funlen
    - dupl
    - goconst
    - gocritic
    - revive
    - unconvert
    - unparam
    - wastedassign

    # Performance and optimization
    - prealloc
    - bodyclose
    - perfsprint
    - makezero
    - intrange

    # Security and safety
    - gosec
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - contextcheck

    # Error handling best practices
    - errorlint
    - wrapcheck
    - errname

    # Modern Go patterns and anti-patterns
    - copyloopvar
    - gochecksumtype
    - usestdlibvars
    - modernize
    - mirror

    # Code organization and maintainability
    - maintidx
    - iface
    - nakedret
    - nestif
    - rowserrcheck
    - sqlclosecheck

    # Import and dependency management
    - importas
    - gomoddirectives

    # Documentation and testing
    - godoclint
    - thelper
    - tparallel
    - testifylint

    # Code style (minimal, non-nitpick)
    - misspell
    - whitespace
    - tagalign

  disable:
    # Nitpick rules that don't add significant value
    - exhaustive # Too strict for enum-like patterns
    - forbidigo # No function forbidding needed
    - godot # Comment periods not critical
    - godox # TODO comments are acceptable
    - mnd # Magic numbers OK in algorithms
    - gomodguard # No module restrictions needed
    - ireturn # Interface returns are acceptable
    - nlreturn # Newline returns are style preference
    - varnamelen # Short variables OK in limited scope
    - testpackage # Test package separation not required
    - paralleltest # Parallel tests not always appropriate
    - nosprintfhostport # URL formatting is controlled
    - nolintlint # Nolint directives are acceptable
    - goprintffuncname # Function naming flexibility

  exclusions:
    paths:
      - internal/profiling
      - internal/comparison
      - cmd/profile-execution
      - cmd/compare
      - cmd/parity
      - vendor
    rules:
      # Test files - more lenient rules for testing code
      - path: '_test\.go'
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - funlen
          - goconst
          - gocognit
          - cyclop
          - maintidx
          - prealloc
          - nestif
          - unparam
          - wastedassign
          - noctx
          - wrapcheck
          - staticcheck

      # Benchmark files - special allowances for performance testing
      - path: 'benchmark.*_test\.go'
        linters:
          - errcheck
          - gosec
          - prealloc
          - nestif
          - gocyclo
          - gocognit

      # Performance-critical lexer code - inherent complexity
      - path: 'internal/lexer/.*\.go'
        text: "cyclomatic complexity|cognitive complexity|function-length|has too many statements"
        linters:
          - gocyclo
          - cyclop
          - gocognit
          - revive
          - funlen

      # Complex algorithms in compiler - acceptable complexity
      - path: 'compiler/(bytecode|interpreter|ahocorasick|emitter|condition_compiler)\.go'
        text: "cyclomatic complexity|cognitive complexity|function-length|has too many statements"
        linters:
          - gocyclo
          - cyclop
          - gocognit
          - revive
          - funlen
          - maintidx

      # Parser complexity - grammar rules are inherently complex
      - path: 'parser/.*\.go'
        text: "cyclomatic complexity|cognitive complexity|calculated cyclomatic complexity"
        linters:
          - gocyclo
          - cyclop
          - gocognit
          - maintidx

      # Regex engine - performance-critical pattern matching
      - path: 'regex/.*\.go'
        text: "cyclomatic complexity|cognitive complexity|the average complexity for the package"
        linters:
          - gocyclo
          - cyclop
          - gocognit
          - maintidx

      # Token constants - ALL_CAPS convention for YARA compatibility
      - path: 'token/token\.go'
        text: "var-naming: don't use ALL_CAPS|exported: type name will be used"
        linters:
          - revive

      # Builder pattern functions - argument-limit exceptions for legitimate API design
      - path: 'ast/builder\.go'
        text: "argument-limit: maximum number of arguments per function exceeded"
        linters:
          - revive

      # Public API functions - argument-limit exceptions for backward compatibility
      - path: 'compiler/ahocorasick\.go'
        text: "argument-limit: maximum number of arguments per function exceeded"
        linters:
          - revive

      # Tooling and CLI code - argument-limit exceptions acceptable
      - path: 'cmd/.*\.go'
        text: "argument-limit: maximum number of arguments per function exceeded"
        linters:
          - revive

      # Bytecode operations - argument-limit exceptions for VM instructions
      - path: 'compiler/bytecode\.go'
        text: "argument-limit: maximum number of arguments per function exceeded"
        linters:
          - revive

      # Emitter functions - argument-limit exceptions for opcode emission API
      - path: 'compiler/emitter\.go'
        text: "argument-limit: maximum number of arguments per function exceeded"
        linters:
          - revive

      # Condition compiler functions - argument-limit exceptions for compilation API
      - path: 'compiler/condition_compiler\.go'
        text: "argument-limit: maximum number of arguments per function exceeded"
        linters:
          - revive

      # Bytecode opcodes - ALL_CAPS for libyara compatibility
      - path: 'compiler/bytecode\.go'
        text: "var-naming: don't use ALL_CAPS|var-naming: don't use underscores|exported: exported const"
        linters:
          - revive

      # Safe integer conversions - explicitly handled
      - path: 'compiler/.*\.go'
        text: "G115: integer overflow conversion"
        linters:
          - gosec

      # CLI tools - file operations are expected
      - path: 'cmd/.*\.go'
        text: "Potential file inclusion via variable"
        linters:
          - gosec

      # CGo integration - exclude typecheck due to C dependencies
      - path: 'internal/comparison/.*\.go'
        linters:
          - typecheck
          - errcheck
          - gosec
          - govet
          - staticcheck
          - unused

      # Profiling tools excluded at issues level

      # Common patterns that are acceptable
      - path: '.*\.go'
        text: "Consider pre-allocating|result 1 \\(error\\) is always nil|assigned to.*, but never used afterwards"
        linters:
          - prealloc
          - unparam
          - wastedassign

      # Interface methods - unused parameters are acceptable
      - path: 'parser/parser\.go'
        text: "result 1 \\(error\\) is always nil"
        linters:
          - unparam

      # Empty branches in compiler - intentional control flow
      - path: 'compiler/.*\.go'
        text: "SA9003: empty branch"
        linters:
          - staticcheck

      # False positive duplicate detection
      - path: 'parser/parser\.go'
        text: "lines are duplicate of"
        linters:
          - dupl

      # Acceptable complexity in core algorithms
      - path: '.*\.go'
        text: "has complex nested blocks"
        linters:
          - nestif

      # Function length limits for complex algorithms
      - path: '.*\.go'
        text: "has too many statements|is too long"
        linters:
          - funlen
          - revive

      # Generated files - exclude all linting
      - path: '.*\.pb\.go$'
        linters:
          - all
      - path: '.*_generated\.go$'
        linters:
          - all

      # Tooling and comparison directories - exclude all linting
      - path: 'cmd/compare/.*\.go'
        linters:
          - all
      - path: 'cmd/parity/.*\.go'
        linters:
          - all
      - path: 'benchmark.*_test\.go'
        linters:
          - all

      # Vendor directories
      - path: "vendor/.*"
        linters:
          - all

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  # Show all issues, not just new ones
  new: false
  exclude-rules:
    # Exclude profiling directories from all linting
    - path: 'internal/profiling/.*\.go'
      linters:
        - all
    - path: 'internal/comparison/.*\.go'
      linters:
        - all

    # Exclude tooling directories from complexity and style checks
    - path: 'cmd/compare/.*\.go'
      linters:
        - cyclop
        - gocognit
        - gocyclo
        - funlen
        - maintidx
        - nestif
        - argument-limit
    - path: 'cmd/parity/.*\.go'
      linters:
        - cyclop
        - gocognit
        - gocyclo
        - funlen
        - maintidx
        - nestif
        - argument-limit

    # Exclude test files from complexity checks
    - path: '.*_test\.go'
      linters:
        - cyclop
        - gocognit
        - gocyclo
        - funlen
        - maintidx
        - nestif
        - argument-limit
        - unused-parameter

    # Exclude test files from unused parameter warnings
    - path: '.*_test\.go'
      text: "unused-parameter.*seems to be unused"
      linters:
        - revive

    # Exclude test files from staticcheck SA5011 (false positive nil pointer warnings)
    - path: '.*_test\.go'
      text: "SA5011.*possible nil pointer dereference"
      linters:
        - staticcheck

severity:
  default: error
