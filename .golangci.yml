version: 2

run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - unused
    - ineffassign
    - errcheck
    - revive
    - nestif
    - gocritic
  settings:
    revive:
      rules:
        - name: early-return
          disabled: false
        - name: if-return
          disabled: false

    gocritic:
      enabled-checks:
        - nestingReduce
      settings:
        nestingReduce:
          bodyWidth: 5

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/...
