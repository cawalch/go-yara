name: Fuzz Testing

on:
  schedule:
    # Run fuzz tests daily at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  FUZZTIME: 30s
  EXTENDED_FUZZTIME: 120s

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # CI/CD friendly timeout

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Run fuzz tests
        run: make fuzz FUZZTIME=${{ env.FUZZTIME }}

      - name: Upload fuzz artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-crash-logs
          path: |
            **/testdata/fuzz/
          if-no-files-found: ignore
          retention-days: 30

  fuzz-extended:
    runs-on: ubuntu-latest
    timeout-minutes: 120 # Extended timeout for thorough fuzzing
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Run extended fuzz tests
        run: make fuzz FUZZTIME=${{ env.EXTENDED_FUZZTIME }}

      - name: Upload fuzz artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: extended-fuzz-crash-logs
          path: |
            **/testdata/fuzz/
          if-no-files-found: ignore
          retention-days: 30
