name: Enhanced CI with Performance Monitoring

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  actions: read
  security-events: write

env:
  GO_VERSION: "1.25.1"

jobs:
  # Enhanced lint job (existing)
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache-dependency-path: go.mod

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.mod') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.6.0

      - name: Run golangci-lint
        run: |
          golangci-lint run

      - name: Check formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -s -l .
            exit 1
          fi

      - name: Check imports
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          if [ "$(goimports -l . | wc -l)" -gt 0 ]; then
            echo "The following files have import issues:"
            goimports -l .
            exit 1
          fi

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
            echo "go.mod/go.sum not tidy. Run 'go mod tidy' locally."
            git --no-pager diff -- go.mod go.sum || true
            exit 1
          fi

  # Enhanced test job (existing)
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25.1"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true
          cache-dependency-path: go.mod

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.mod') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: |
          pkgs=$(go list ./... | grep -v '/internal/comparison$' | grep -v '/cmd$' | grep -v '/cmd/parity$')
          go test -race -coverprofile=coverage.out $pkgs

      - name: Check test coverage
        run: |
          FILTERED_COVERAGE=$(go tool cover -func=coverage.out | awk '$3 != "0.0%" && $0 !~ /debug_string_ops/ && $0 !~ /PrintStats|PrintDebug|PrintInstructions|PrintBytecode/ && $0 !~ /processEscapeSequencesOriginal/ && $0 !~ /ValidateOptions/' | awk '{sum += $3; count++} END {if (count > 0) printf "%.1f", sum/count}')

          echo "Filtered Coverage: ${FILTERED_COVERAGE}%"

          if awk "BEGIN {exit !($FILTERED_COVERAGE < 80)}"; then
            echo "Coverage is below 80% after filtering irrelevant code"
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          flags: unittests
          name: codecov-umbrella

  # NEW: Comprehensive Performance Benchmarking
  performance:
    name: Performance Monitoring
    runs-on: ubuntu-latest
    outputs:
      performance-score: ${{ steps.evaluate.outputs.score }}
      regression-detected: ${{ steps.evaluate.outputs.regression }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache-dependency-path: go.mod

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.mod') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Create performance results directory
        run: mkdir -p performance-results

      # Download historical baseline data
      - name: Download performance baselines
        if: github.event_name == 'pull_request'
        run: |
          echo "=== Checking for performance baselines ==="

          # Create baselines directory
          mkdir -p performance-baselines

          # Check if performance baselines exist
          ARTIFACT_ID=$(gh api repos/${{ github.repository }}/actions/artifacts --jq '.artifacts[] | select(.name == "performance-baselines" and .workflow_run.head_branch == "main") | .id' | head -1 || echo "")

          if [ -n "$ARTIFACT_ID" ]; then
            echo "Found performance baselines artifact ID: $ARTIFACT_ID"
            # Use curl to download the artifact zip file
            if curl -L -H "Authorization: token ${{ github.token }}" \
                   -H "Accept: application/vnd.github.v3+json" \
                   "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip" \
                   -o baselines.zip; then
              echo "Downloaded baselines.zip, extracting..."
              if unzip -q baselines.zip -d performance-baselines/; then
                echo "Performance baselines downloaded and extracted successfully"
                ls -la performance-baselines/
              else
                echo "Failed to extract baselines.zip"
                rm -f baselines.zip
              fi
              rm -f baselines.zip
            else
              echo "Failed to download performance baselines artifact"
            fi
          else
            echo "No performance baselines found - will create new baseline"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      # Run focused performance benchmarks (optimized for CI speed)
      - name: Run focused performance suite
        run: |
          echo "=== Running Focused Performance Suite (2-3 minutes) ==="

          # 1. Critical ACAutomaton Benchmarks (fastest, most important)
          echo "1. Running ACAutomaton Benchmarks..."
          go test -bench=BenchmarkMicro_StringMatching_PerformanceRegression -benchmem -benchtime=1s -count=1 -run=^$ ./compiler > performance-results/automaton_bench.txt

          # 2. Essential Lexer Benchmarks
          echo "2. Running Key Lexer Benchmarks..."
          go test -bench="BenchmarkLexer_.*" -benchmem -benchtime=1s -count=1 -run=^$ ./internal/lexer > performance-results/lexer_bench.txt

          # 3. Quick End-to-End Check
          echo "3. Running Quick E2E Check..."
          go test -bench=BenchmarkACAutomaton_StringMatching -benchmem -benchtime=1s -count=1 -run=^$ ./compiler > performance-results/e2e_bench.txt

          echo "Performance suite completed in ~2-3 minutes!"

      # Performance comparison against baselines
      - name: Compare against baselines
        if: github.event_name == 'pull_request'
        run: |
          echo "=== Quick Performance Regression Analysis ==="

          # Install benchstat for comparison
          go install golang.org/x/perf/cmd/benchstat@latest

          # Compare critical ACAutomaton performance (most important for regressions)
          if [ -f "performance-baselines/automaton_bench.txt" ]; then
            echo "ACAutomaton Performance Comparison:"
            benchstat performance-baselines/automaton_bench.txt performance-results/automaton_bench.txt > performance-results/automaton_comparison.txt
            cat performance-results/automaton_comparison.txt
          else
            echo "No automaton baseline found - will create new baseline"
            cp performance-results/automaton_bench.txt performance-results/automaton_baseline.txt
          fi

          # Quick E2E check
          if [ -f "performance-baselines/e2e_bench.txt" ]; then
            echo "E2E Performance Summary:"
            echo "Baseline completed successfully"
            echo "Current completed successfully"
          fi

      # Focused regression detection on critical components
      - name: Check performance regressions
        if: github.event_name == 'pull_request'
        run: |
          echo "=== Focused Regression Detection ==="

          FAIL=0

          # ACAutomaton regression: 2% threshold (CRITICAL COMPONENT)
          if [ -f "performance-results/automaton_comparison.txt" ]; then
            if grep -E "\+([2-9]\.[0-9]|[1-9][0-9]+\.[0-9])%.*ns/op" performance-results/automaton_comparison.txt; then
              echo "❌ ACAutomaton regression exceeds 2% threshold - CRITICAL!"
              FAIL=1
            else
              echo "✅ ACAutomaton performance within 2% threshold"
            fi

            # Check memory allocation regressions
            if grep -E "\+[1-9][0-9]*\.[0-9]%.*allocs/op" performance-results/automaton_comparison.txt; then
              echo "❌ Memory allocation regression detected in ACAutomaton"
              FAIL=1
            else
              echo "✅ No memory allocation regressions in ACAutomaton"
            fi
          fi

          if [ "$FAIL" -ne 0 ]; then
            echo "❌ Performance regression detected"
            exit 1
          fi

          echo "✅ Critical performance checks passed"

      # Quick memory analysis (only if time permits)
      - name: Quick memory analysis
        if: github.event_name != 'pull_request'
        run: |
          echo "=== Quick Memory Analysis (main branch only) ==="

          # Run a quick memory benchmark
          go test -bench=BenchmarkMicro_StringMatching_PerformanceRegression -benchmem -benchtime=1s -run=^$ ./compiler > performance-results/memory_check.txt

          echo "Memory analysis completed"

      # Quick performance score evaluation
      - name: Evaluate performance score
        id: evaluate
        run: |
          echo "=== Quick Performance Score Evaluation ==="

          SCORE=100
          REGRESSION_DETECTED="false"

          # Check if key benchmarks completed successfully
          if [ -f "performance-results/automaton_bench.txt" ] && [ -f "performance-results/lexer_bench.txt" ]; then
            echo "✅ Critical benchmarks completed successfully"
            SCORE=$((SCORE))
          else
            echo "❌ Critical benchmarks failed"
            SCORE=$((SCORE - 20))
          fi

          # Cap score at 100
          if [ "$SCORE" -gt 100 ]; then
            SCORE=100
          fi

          echo "Performance Score: $SCORE/100"

          # Set outputs for other jobs
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "regression=$REGRESSION_DETECTED" >> $GITHUB_OUTPUT

      # Upload comprehensive performance results
      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results-${{ github.run_number }}
          path: |
            performance-results/
            benchmark_results.txt
            baseline_benchmark.txt
          retention-days: 30

      # Store critical baselines for future comparisons
      - name: Store critical performance baselines
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: performance-baselines
          path: |
            performance-results/automaton_bench.txt
            performance-results/lexer_bench.txt
            performance-results/e2e_bench.txt
          retention-days: 90

  # Enhanced security scan (existing)
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run Gosec Security Scanner
        run: |
          $(go env GOPATH)/bin/gosec -exclude=G115,G204,G304 -exclude-dir=internal/comparison -exclude-dir=internal/profiling/comparison -no-fail -fmt sarif -out gosec.sarif ./... || echo "gosec completed with warnings"

      - name: Verify SARIF file
        run: |
          if [ ! -f gosec.sarif ]; then
            echo "SARIF file not found"
            exit 1
          fi
          echo "SARIF file size: $(wc -c < gosec.sarif) bytes"

  # Enhanced memory leak check
  memory:
    name: Enhanced Memory Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache-dependency-path: go.mod

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.mod') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run comprehensive memory analysis
        run: |
          mkdir -p profiles
          echo "=== Comprehensive Memory Leak Analysis ==="

          # ACAutomaton memory profiling
          echo "1. ACAutomaton Memory Analysis..."
          go test -bench=BenchmarkMicro_StringMatching_PerformanceRegression \
                  -memprofile=profiles/automaton_mem.out \
                  -run=^$ ./compiler

          # Lexer memory profiling with stress test
          echo "2. Lexer Memory Stress Test..."
          go test -bench=BenchmarkLexer_ManyIdentifiers \
                  -memprofile=profiles/lexer_mem.out \
                  -run=^$ ./internal/lexer

          # Additional memory-intensive benchmarks
          echo "3. Large Data Processing Memory Test..."
          go test -bench=BenchmarkLexer_StringModifiers_WithStrings \
                  -memprofile=profiles/large_data_mem.out \
                  -run=^$ ./internal/lexer

          # Analyze memory profiles
          echo "=== Memory Profile Analysis ==="

          echo "ACAutomaton Memory Hotspots:"
          go tool pprof -alloc_space -top profiles/automaton_mem.out | head -10

          echo "Lexer Memory Hotspots:"
          go tool pprof -alloc_space -top profiles/lexer_mem.out | head -10

          echo "Large Data Memory Hotspots:"
          go tool pprof -alloc_space -top profiles/large_data_mem.out | head -10

          # Check for potential memory leaks
          echo "=== Memory Leak Detection ==="
          TOTAL_ALLOCS=$(go tool pprof -alloc_space -text profiles/automaton_mem.out | grep "Total allocations" | grep -o "[0-9]*" || echo "0")
          echo "Total allocations: $TOTAL_ALLOCS"

          # Alert on high allocation counts
          if [ "$TOTAL_ALLOCS" -gt 10000000 ]; then
            echo "⚠️ Very high allocation count detected: $TOTAL_ALLOCS"
          elif [ "$TOTAL_ALLOCS" -gt 1000000 ]; then
            echo "⚠️ High allocation count detected: $TOTAL_ALLOCS"
          else
            echo "✅ Allocation count is reasonable: $TOTAL_ALLOCS"
          fi

      - name: Upload memory profiles
        uses: actions/upload-artifact@v4
        with:
          name: memory-profiles-${{ github.run_number }}
          path: profiles/
          retention-days: 30

  # Quality gate with performance metrics
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, test, performance, security, memory]
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "=== Quality Gate Results ==="

          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "❌ Lint job failed"
            exit 1
          fi

          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Test job failed"
            exit 1
          fi

          if [ "${{ needs.performance.result }}" != "success" ]; then
            echo "❌ Performance job failed"
            exit 1
          fi

          if [ "${{ needs.security.result }}" != "success" ]; then
            echo "❌ Security job failed"
            exit 1
          fi

          if [ "${{ needs.memory.result }}" != "success" ]; then
            echo "❌ Memory job failed"
            exit 1
          fi

          # Display performance score
          PERF_SCORE="${{ needs.performance.outputs.performance-score }}"
          PERF_REGRESSION="${{ needs.performance.outputs.regression-detected }}"

          echo "📊 Performance Score: $PERF_SCORE/100"
          echo "🔍 Regression Detected: $PERF_REGRESSION"

          if [ "$PERF_SCORE" -ge 90 ]; then
            echo "🏆 EXCELLENT: Performance score $PERF_SCORE/100"
          elif [ "$PERF_SCORE" -ge 80 ]; then
            echo "✅ GOOD: Performance score $PERF_SCORE/100"
          elif [ "$PERF_SCORE" -ge 70 ]; then
            echo "⚠️ ACCEPTABLE: Performance score $PERF_SCORE/100"
          fi

          echo "✅ All quality checks passed!"

  # Optional: Performance Report Generation
  performance-report:
    name: Performance Report
    runs-on: ubuntu-latest
    needs: [performance]
    if: always() && needs.performance.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download performance results
        uses: actions/download-artifact@v4
        with:
          name: performance-results-${{ github.run_number }}
          path: performance-results/

      - name: Generate performance report
        run: |
          echo "# Performance Analysis Report" > performance-report.md
          echo "" >> performance-report.md
          echo "Generated: $(date)" >> performance-report.md
          echo "" >> performance-report.md

          # Add lexer results
          if [ -f "performance-results/lexer_bench.txt" ]; then
            echo "## Lexer Performance" >> performance-report.md
            echo '```' >> performance-report.md
            cat performance-results/lexer_bench.txt >> performance-report.md
            echo '```' >> performance-report.md
            echo "" >> performance-report.md
          fi

          # Add automaton results
          if [ -f "performance-results/automaton_bench.txt" ]; then
            echo "## ACAutomaton Performance" >> performance-report.md
            echo '```' >> performance-report.md
            cat performance-results/automaton_bench.txt >> performance-report.md
            echo '```' >> performance-report.md
            echo "" >> performance-report.md
          fi

          # Add E2E results
          if [ -f "performance-results/e2e_bench.txt" ]; then
            echo "## End-to-End Performance" >> performance-report.md
            echo '```' >> performance-report.md
            cat performance-results/e2e_bench.txt >> performance-report.md
            echo '```' >> performance-report.md
            echo "" >> performance-report.md
          fi

          # Add libyara comparison
          if [ -f "performance-results/libyara_comparison.txt" ]; then
            echo "## LibYARA Comparison" >> performance-report.md
            echo '```' >> performance-report.md
            tail -20 performance-results/libyara_comparison.txt >> performance-report.md
            echo '```' >> performance-report.md
          fi

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        with:
          name: performance-report-${{ github.run_number }}
          path: performance-report.md
          retention-days: 30
