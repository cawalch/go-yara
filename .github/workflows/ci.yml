name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  actions: read
  security-events: write

env:
  GO_VERSION: "1.25.1"

jobs:
  # Enhanced lint job (existing)
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache-dependency-path: go.mod

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.mod') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.6.0

      - name: Run golangci-lint
        run: |
          golangci-lint run

      - name: Check formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -s -l .
            exit 1
          fi

      - name: Check imports
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          if [ "$(goimports -l . | wc -l)" -gt 0 ]; then
            echo "The following files have import issues:"
            goimports -l .
            exit 1
          fi

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
            echo "go.mod/go.sum not tidy. Run 'go mod tidy' locally."
            git --no-pager diff -- go.mod go.sum || true
            exit 1
          fi

  # Enhanced test job (existing)
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25.1"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true
          cache-dependency-path: go.mod

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.mod') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: |
          pkgs=$(go list ./... | grep -v '/internal/comparison$' | grep -v '/cmd$' | grep -v '/cmd/parity$')
          go test -race -coverprofile=coverage.out $pkgs

      - name: Check test coverage
        run: |
          FILTERED_COVERAGE=$(go tool cover -func=coverage.out | awk '$3 != "0.0%" && $0 !~ /debug_string_ops/ && $0 !~ /PrintStats|PrintDebug|PrintInstructions|PrintBytecode/ && $0 !~ /processEscapeSequencesOriginal/ && $0 !~ /ValidateOptions/' | awk '{sum += $3; count++} END {if (count > 0) printf "%.1f", sum/count}')

          echo "Filtered Coverage: ${FILTERED_COVERAGE}%"

          if awk "BEGIN {exit !($FILTERED_COVERAGE < 80)}"; then
            echo "Coverage is below 80% after filtering irrelevant code"
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          flags: unittests
          name: codecov-umbrella

  # Performance Benchmarks
  performance:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache-dependency-path: go.mod

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.mod') }}

      - name: Download dependencies
        run: go mod download

      - name: Run performance benchmarks
        run: |
          echo "=== Running Statistical Performance Benchmarks ==="
          mkdir -p performance-results

          # Run multiple times for statistical significance (standard runners have more variability)
          echo "Running ACAutomaton benchmarks (7 iterations)..."
          for i in {1..7}; do
            echo "Iteration $i:"
            go test -bench=BenchmarkMicro_StringMatching_PerformanceRegression -benchmem -count=1 -run=^$ ./compiler >> performance-results/automaton.txt
            sleep 1  # Brief pause between runs
          done

          echo "Running Lexer benchmarks (5 iterations)..."
          for i in {1..5}; do
            echo "Iteration $i:"
            go test -bench="BenchmarkLexer_.*" -benchmem -count=1 -run=^$ ./internal/lexer >> performance-results/lexer.txt
            sleep 1
          done

          echo "Performance benchmarks completed"

      - name: Check for major performance regressions
        run: |
          echo "=== Checking for Major Performance Regressions ==="

          # Only fail on major regressions (>30% change)
          # This accounts for GitHub Actions runner variability
          FAIL=0

          # Check ACAutomaton performance
          if [ -f "performance-results/automaton.txt" ]; then
            echo "Analyzing ACAutomaton performance..."
            if grep -E "\+([3-9][0-9]|[1-9][0-9]{2,})%.*ns/op" performance-results/automaton.txt; then
              echo "❌ Major ACAutomaton performance regression detected (>30%)"
              FAIL=1
            else
              echo "✅ ACAutomaton performance within acceptable range"
            fi
          fi

          # Check Lexer performance
          if [ -f "performance-results/lexer.txt" ]; then
            echo "Analyzing Lexer performance..."
            if grep -E "\+([3-9][0-9]|[1-9][0-9]{2,})%.*ns/op" performance-results/lexer.txt; then
              echo "❌ Major Lexer performance regression detected (>30%)"
              FAIL=1
            else
              echo "✅ Lexer performance within acceptable range"
            fi
          fi

          if [ "$FAIL" -ne 0 ]; then
            echo ""
            echo "❌ Performance regression detected!"
            echo "Note: GitHub Actions runners have ~5-15% performance variability."
            echo "This regression exceeds the 30% threshold for major regressions."
            exit 1
          fi

          echo ""
          echo "✅ No major performance regressions detected"
          echo "Performance is within acceptable range for CI environment variability"

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: performance-results/
          retention-days: 30

  # Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run security scan
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -exclude=G115,G204,G304 -exclude-dir=internal/comparison -exclude-dir=internal/profiling/comparison ./...

  # Quality gate
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, test, performance, security]
    if: always()
    steps:
      - name: Check job results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "❌ Lint job failed"
            exit 1
          fi

          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Test job failed"
            exit 1
          fi

          if [ "${{ needs.performance.result }}" != "success" ]; then
            echo "❌ Performance job failed"
            exit 1
          fi

          if [ "${{ needs.security.result }}" != "success" ]; then
            echo "❌ Security job failed"
            exit 1
          fi

          echo "✅ All quality checks passed!"

  