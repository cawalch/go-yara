name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  actions: read
  security-events: write

env:
  GO_VERSION: "1.26.0"

jobs:
  # Enhanced lint job (existing)
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.mod', '**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.10.1

      - name: Run golangci-lint
        run: |
          golangci-lint run

      - name: Check formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -s -l .
            exit 1
          fi

      - name: Check imports
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          if [ "$(goimports -l . | wc -l)" -gt 0 ]; then
            echo "The following files have import issues:"
            goimports -l .
            exit 1
          fi

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
            echo "go.mod/go.sum not tidy. Run 'go mod tidy' locally."
            git --no-pager diff -- go.mod go.sum || true
            exit 1
          fi

  # Enhanced test job (existing)
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.26.0"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.mod', '**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-

      - name: Download dependencies
        run: go mod download

      - name: Run race tests
        run: go test -race ./...

      - name: Run coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Check test coverage
        run: |
          FILTERED_COVERAGE=$(go tool cover -func=coverage.out | awk '$3 != "0.0%" && $0 !~ /debug_string_ops/ && $0 !~ /PrintStats|PrintDebug|PrintInstructions|PrintBytecode/ && $0 !~ /processEscapeSequencesOriginal/ && $0 !~ /ValidateOptions/' | awk '{sum += $3; count++} END {if (count > 0) printf "%.1f", sum/count}')

          echo "Filtered Coverage: ${FILTERED_COVERAGE}%"

          if awk "BEGIN {exit !($FILTERED_COVERAGE < 80)}"; then
            echo "Coverage is below 80% after filtering irrelevant code"
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          flags: unittests
          name: codecov-umbrella

  # Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-security-${{ hashFiles('**/go.mod', '**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-security-

      - name: Run security scan
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -exclude=G115,G204,G304 ./...

  # Fuzz gate
  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-fuzz-${{ hashFiles('**/go.mod', '**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-fuzz-

      - name: Download dependencies
        run: go mod download

      - name: Run fuzz gate
        run: make fuzz FUZZTIME=10s

      - name: Upload fuzz artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ci-fuzz-crash-logs
          path: |
            **/testdata/fuzz/
          if-no-files-found: ignore
          retention-days: 30

  benchmark_tournament:
    name: Benchmark Tournament
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-${{ runner.arch }}-go-tournament-${{ hashFiles('go.sum', 'performance/tournament/yarax/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-go-tournament-

      - name: Install yara-x C API
        run: brew install pkgconf yara-x

      - name: Download dependencies
        run: |
          go mod download
          (cd performance/tournament/yarax && go mod download)

      - name: Run benchmark tournament
        run: make bench-vs-yarax BENCHTIME=100ms BENCHCOUNT=3

      - name: Upload tournament report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-tournament
          path: performance/tournament/results/
          if-no-files-found: error
          retention-days: 30

  # Quality gate
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, test, security, fuzz, benchmark_tournament]
    if: always()
    steps:
      - name: Check job results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "❌ Lint job failed"
            exit 1
          fi

          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Test job failed"
            exit 1
          fi

          if [ "${{ needs.security.result }}" != "success" ]; then
            echo "❌ Security job failed"
            exit 1
          fi

          if [ "${{ needs.fuzz.result }}" != "success" ]; then
            echo "❌ Fuzz job failed"
            exit 1
          fi

          if [ "${{ needs.benchmark_tournament.result }}" != "success" ]; then
            echo "❌ Benchmark tournament failed"
            exit 1
          fi

          echo "✅ All quality checks passed!"
